name: Deploy Pipe Notch Generator to Website

# Срабатывать при пуше в ветку main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Скачиваем код игры
      - name: Checkout Source
        uses: actions/checkout@v4

      # 2. Ставим pnpm (версия берётся из packageManager в package.json)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 3. Ставим Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # 4. Устанавливаем зависимости и собираем
      - name: Install and Build
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          mv dist/index.html dist/app.html
        # Теперь у нас есть папка dist с готовой игрой

      # 5. Отправляем папку dist в репозиторий сайта
      - name: Push to Website Repository
        uses: cpina/github-action-push-to-another-repository@main
        env:
          # Тот самый секрет, который мы создали
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
        with:
          source-directory: 'dist'
          destination-github-username: 'Biosxxx'
          destination-repository-name: 'cadautoscript.com'
          target-directory: 'static/utility-apps/pipe-cutter'
          user-email: 'bot@pvt-game.com'
          target-branch: 'main'
